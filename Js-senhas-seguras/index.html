<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de senha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="conteudo">
        <div class="conteudo-titulo">
            <img src="unlock.svg" alt="cadeado fechado">
            <h2 class="titulo-principal">Gerador de senhas</h2>
            <h3 class="titulo-secundario">Gere instantaneamente uma senha aleatória e segura</h3>
        </div>
        <div class="conteudo-senha">
            <label for="senha">Senha</label>
            <input name="senha" type="text" id="campo-senha">
            <div class="forca-senha">
                <span class="forca-senha__texto">Força: <strong id="forca-texto">Fraca</strong></span>
                <div class="forca-senha__barra">
                    <div class="forca-senha__barra-preenchimento fraca" id="forca-barra"></div>
                </div>
            </div>
        </div>
        <div class="parametro">
            <h3 class="parametro-titulo">Personalize sua senha</h3>
            <div class="parametro-coluna__senha">
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Número de caracteres</h4>
                    <div class="parametro-senha-botoes">
                        <button id="botao-diminuir" class="parametro-senha__botao">-</button>
                        <p class="parametro-senha__texto" id="texto-quantidade">12</p>
                        <button id="botao-aumentar" class="parametro-senha__botao">+</button>
                    </div>
                </div>               
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Características da senha</h4>
                    <ul class="caracteristicas-lista">
                        <li><label><input type="checkbox" id="checkbox-maiusculas" checked> Letras maiúsculas</label></li>
                        <li><label><input type="checkbox" id="checkbox-minusculas" checked> Letras minúsculas</label></li>
                        <li><label><input type="checkbox" id="checkbox-numeros" checked> Números</label></li>
                        <li><label><input type="checkbox" id="checkbox-simbolos" checked> Símbolos</label></li>
                    </ul>
                </div>
                <div class="parametro-senha">
                    <button id="botao-gerar" class="botao-gerar">Gerar senha</button>
                </div>
            </div>
        </div>
    </section>
</body>

    <script>
        const campoSenha = document.getElementById('campo-senha');
        const forcaTexto = document.getElementById('forca-texto');
        const forcaBarra = document.getElementById('forca-barra');
        const botaoDiminuir = document.getElementById('botao-diminuir');
        const botaoAumentar = document.getElementById('botao-aumentar');
        const textoQuantidade = document.getElementById('texto-quantidade');
        const checkboxMaiusculas = document.getElementById('checkbox-maiusculas');
        const checkboxMinusculas = document.getElementById('checkbox-minusculas');
        const checkboxNumeros = document.getElementById('checkbox-numeros');
        const checkboxSimbolos = document.getElementById('checkbox-simbolos');
        const botaoGerar = document.getElementById('botao-gerar');

        const MIN_CARACTERES = 7;
        const MAX_CARACTERES = 20;
        let quantidadeCaracteres = 12;

        campoSenha.maxLength = MAX_CARACTERES;

        function atualizarQuantidade() {
            textoQuantidade.textContent = quantidadeCaracteres;
            if (campoSenha.value.length > quantidadeCaracteres) {
                campoSenha.value = campoSenha.value.slice(0, quantidadeCaracteres);
            }
            atualizarForcaSenha();
        }

        function atualizarForcaSenha() {
            const senha = campoSenha.value;
            let pontos = 0;

            if (senha.length >= MIN_CARACTERES) pontos++;
            if (/[A-Z]/.test(senha)) pontos++;
            if (/[a-z]/.test(senha)) pontos++;
            if (/[0-9]/.test(senha)) pontos++;
            if (/[^A-Za-z0-9]/.test(senha)) pontos++;

            let nivel = 'fraca';
            let texto = 'Fraca';

            if (senha.length > 0) {
                if (pontos <= 2) {
                    nivel = 'fraca';
                    texto = 'Fraca';
                } else if (pontos <= 4) {
                    nivel = 'media';
                    texto = 'Média';
                } else {
                    nivel = 'forte';
                    texto = 'Forte';
                }
            }

            forcaTexto.textContent = texto;
            forcaBarra.className = `forca-senha__barra-preenchimento ${nivel}`;
        }

        function gerarSenha() {
            const conjuntos = [];
            const maiusculas = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const minusculas = 'abcdefghijklmnopqrstuvwxyz';
            const numeros = '0123456789';
            const simbolos = '!@#$%^&*()-_=+[]{};:,.<>?/~`';

            if (checkboxMaiusculas.checked) conjuntos.push(maiusculas);
            if (checkboxMinusculas.checked) conjuntos.push(minusculas);
            if (checkboxNumeros.checked) conjuntos.push(numeros);
            if (checkboxSimbolos.checked) conjuntos.push(simbolos);

            if (conjuntos.length === 0) {
                alert('Selecione ao menos uma característica de senha.');
                return;
            }

            let senha = '';
            const todosCaracteres = conjuntos.join('');

            conjuntos.forEach(conjunto => {
                senha += conjunto[Math.floor(Math.random() * conjunto.length)];
            });

            while (senha.length < quantidadeCaracteres) {
                senha += todosCaracteres[Math.floor(Math.random() * todosCaracteres.length)];
            }

            senha = senha.split('').sort(() => Math.random() - 0.5).join('');
            campoSenha.value = senha.slice(0, quantidadeCaracteres);
            atualizarForcaSenha();
        }

        botaoDiminuir.addEventListener('click', () => {
            if (quantidadeCaracteres > MIN_CARACTERES) {
                quantidadeCaracteres -= 1;
                atualizarQuantidade();
            }
        });

        botaoAumentar.addEventListener('click', () => {
            if (quantidadeCaracteres < MAX_CARACTERES) {
                quantidadeCaracteres += 1;
                atualizarQuantidade();
            }
        });

        botaoGerar.addEventListener('click', gerarSenha);
        campoSenha.addEventListener('input', atualizarForcaSenha);
        atualizarQuantidade();
    </script>
</html>
